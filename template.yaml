AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  finance-lambda — Sistema de finanzas personal cloud-native.
  Telegram bot → Lambda → Google Sheets.
  EventBridge crons para alertas y resumen semanal.

# ─── Parámetros (valores reales solo en samconfig.toml, nunca en el repo) ─────

Parameters:
  FinanceSheetId:
    Type: String
    Description: ID del Google Sheet (visible en la URL del sheet)

  FinanceSaKeyJson:
    Type: String
    NoEcho: true
    Description: Contenido completo del JSON del service account (una sola linea)

  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Token del bot de Telegram (BotFather)

  TelegramChatId:
    Type: String
    Description: Chat ID donde se envian notificaciones y alertas

  BudgetPareja:
    Type: String
    Default: "3000"
    Description: Presupuesto mensual pareja en soles

  BudgetMantys:
    Type: String
    Default: "500"
    Description: Presupuesto mensual MANTYS en soles

  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]

# ─── Globals ──────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        FINANCE_SHEET_ID:    !Ref FinanceSheetId
        FINANCE_SA_KEY_JSON: !Ref FinanceSaKeyJson
        TELEGRAM_BOT_TOKEN:  !Ref TelegramBotToken
        TELEGRAM_CHAT_ID:    !Ref TelegramChatId
        BUDGET_PAREJA:       !Ref BudgetPareja
        BUDGET_MANTYS:       !Ref BudgetMantys

# ─── Recursos ─────────────────────────────────────────────────────────────────

Resources:

  # API Gateway HTTP API (free tier 12 meses, luego $1/M requests)
  FinanceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: Finance Lambda API — Telegram webhook endpoint

  # ── Lambda 1: Webhook Telegram ────────────────────────────────────────────
  FinanceHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-handler-${Environment}
      Description: Recibe webhooks de Telegram, registra gastos/ingresos en Google Sheets
      CodeUri: src/
      Handler: handler.lambda_handler
      Events:
        TelegramWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref FinanceApi
            Path: /webhook
            Method: POST

  # ── Lambda 2: Resumen semanal (Fase 2) ───────────────────────────────────
  FinanceWeeklyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-weekly-${Environment}
      Description: "[Fase 2] Resumen semanal automatico — lunes 8am Peru"
      CodeUri: src/
      Handler: weekly.lambda_handler
      Events:
        WeeklySchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub finance-weekly-schedule-${Environment}
            Description: Lunes 8am Peru (13:00 UTC)
            ScheduleExpression: "cron(0 13 ? * MON *)"
            ScheduleExpressionTimezone: "America/Lima"
            State: ENABLED

  # ── Lambda 3: Alerta de presupuesto (Fase 2) ─────────────────────────────
  FinanceAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-alert-${Environment}
      Description: "[Fase 2] Alerta diaria si gastos superan 80% del presupuesto — 8pm Peru"
      CodeUri: src/
      Handler: alert.lambda_handler
      Events:
        DailyAlertSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub finance-alert-schedule-${Environment}
            Description: Diario 8pm Peru (01:00 UTC siguiente dia)
            ScheduleExpression: "cron(0 1 * * ? *)"
            ScheduleExpressionTimezone: "America/Lima"
            State: ENABLED

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  WebhookUrl:
    Description: >
      URL del webhook — registrar en Telegram con:
      curl "https://api.telegram.org/bot<TOKEN>/setWebhook?url=<ESTA_URL>"
    Value: !Sub "https://${FinanceApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhook"

  HandlerFunctionArn:
    Value: !GetAtt FinanceHandlerFunction.Arn

  WeeklyFunctionArn:
    Value: !GetAtt FinanceWeeklyFunction.Arn

  AlertFunctionArn:
    Value: !GetAtt FinanceAlertFunction.Arn
