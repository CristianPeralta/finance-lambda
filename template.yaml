AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  finance-lambda — Cloud-native personal finance system.
  Telegram bot -> Lambda -> Google Sheets.
  EventBridge crons for budget alerts and weekly summaries.

# ─── Parameters (real values live in samconfig.toml only, never in the repo) ──

Parameters:
  FinanceSheetId:
    Type: String
    Description: Google Sheet ID (visible in the sheet URL)

  FinanceSaKeyJson:
    Type: String
    NoEcho: true
    Description: Full contents of the service account JSON, minified to a single line

  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Telegram bot token from BotFather

  TelegramChatId:
    Type: String
    Description: Chat ID where notifications and alerts are sent

  BudgetPareja:
    Type: String
    Default: "3000"
    Description: Monthly budget for Pareja in soles

  BudgetMantys:
    Type: String
    Default: "500"
    Description: Monthly budget for MANTYS in soles

  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]

# ─── Globals ──────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        FINANCE_SHEET_ID:    !Ref FinanceSheetId
        FINANCE_SA_KEY_JSON: !Ref FinanceSaKeyJson
        TELEGRAM_BOT_TOKEN:  !Ref TelegramBotToken
        TELEGRAM_CHAT_ID:    !Ref TelegramChatId
        BUDGET_PAREJA:       !Ref BudgetPareja
        BUDGET_MANTYS:       !Ref BudgetMantys

# ─── Resources ────────────────────────────────────────────────────────────────

Resources:

  # HTTP API Gateway (free tier 12 months, then $1/M requests)
  FinanceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: Finance Lambda API — Telegram webhook endpoint

  # ── Lambda 1: Telegram webhook ────────────────────────────────────────────
  FinanceHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-handler-${Environment}
      Description: Receives Telegram webhooks and records expenses/income in Google Sheets
      CodeUri: src/
      Handler: handler.lambda_handler
      Events:
        TelegramWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref FinanceApi
            Path: /webhook
            Method: POST

  # ── Lambda 2: Weekly summary (Phase 2) ───────────────────────────────────
  FinanceWeeklyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-weekly-${Environment}
      Description: "[Phase 2] Automatic weekly summary — Monday 8am Peru"
      CodeUri: src/
      Handler: weekly.lambda_handler
      Events:
        WeeklySchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub finance-weekly-schedule-${Environment}
            Description: Monday 8am Peru (13:00 UTC)
            ScheduleExpression: "cron(0 13 ? * MON *)"
            ScheduleExpressionTimezone: "America/Lima"
            State: ENABLED

  # ── Lambda 3: Budget alert (Phase 2) ─────────────────────────────────────
  FinanceAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub finance-alert-${Environment}
      Description: "[Phase 2] Daily alert when spending exceeds 80% of budget — 8pm Peru"
      CodeUri: src/
      Handler: alert.lambda_handler
      Events:
        DailyAlertSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub finance-alert-schedule-${Environment}
            Description: Daily 8pm Peru (01:00 UTC next day)
            ScheduleExpression: "cron(0 1 * * ? *)"
            ScheduleExpressionTimezone: "America/Lima"
            State: ENABLED

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  WebhookUrl:
    Description: >
      Webhook URL — register with Telegram using:
      curl "https://api.telegram.org/bot<TOKEN>/setWebhook?url=<THIS_URL>"
    Value: !Sub "https://${FinanceApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhook"

  HandlerFunctionArn:
    Value: !GetAtt FinanceHandlerFunction.Arn

  WeeklyFunctionArn:
    Value: !GetAtt FinanceWeeklyFunction.Arn

  AlertFunctionArn:
    Value: !GetAtt FinanceAlertFunction.Arn
